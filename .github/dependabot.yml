version: 2
updates:
  # Maintain pinned dependencies for context-fabric
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    # Manual review still required for security fixes in pinned deps:
    # MCP SDK 1.27.1, better-sqlite3 12.8.0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
