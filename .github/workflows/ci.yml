name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 23, 24]
        # Skip Node 25 as better-sqlite3 native binaries are not yet compatible

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build project
      run: npm run build

    - name: Verify release metadata
      run: npm run release:check
      
    - name: Smoke Test
      run: |
        node dist/cli.js init
        # Verify db file creation (standard location)
        ls -la .context-fabric/cf.db

    - name: Run tests
      run: npm test

    - name: Check coverage thresholds
      run: npm run test:cov -- --coverage.thresholds.lines=50
