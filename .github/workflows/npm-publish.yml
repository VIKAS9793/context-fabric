name: NPM Registry Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC & Provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      
      # Publish to npm via Trusted Publishing (Tokenless OIDC)
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Note: MCP Registry publishing requires interactive OAuth device-flow 
      # login via the browser (`mcp-publisher login github`). Thus, it cannot 
      # be automated in this CI workflow. 
      # See `implementation_plan.md` for manual MCP publish instructions.
